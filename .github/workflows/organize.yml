name: Organize Submissions Topicwise

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Organization Script
        # Updated this line to point to where the script actually lives
        run: python "Data Structures & Algorithms/Uncategorized/organize_problems.py"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: organize problems into topic-wise folders"
            git push origin main
          else
            echo "No changes to commit"
          fi
